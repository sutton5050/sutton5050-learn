<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Manager</title>
    <!-- Base ensures relative paths (styles.css, config.json) always resolve
         from /passwords/ regardless of whether the URL has a trailing slash -->
    <base href="/passwords/" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- ── Login ──────────────────────────────────────────────── -->
    <div id="login">
      <div class="login-box">
        <div class="icon">🔐</div>
        <h1>Password Manager</h1>
        <p>Enter your master password to unlock</p>
        <input
          class="input"
          type="password"
          id="master-pw"
          placeholder="Master password"
          onkeydown="if(event.key==='Enter') unlock()"
          autofocus
        />
        <button class="btn btn-primary" id="unlock-btn" onclick="unlock()">Unlock</button>
        <p class="error-msg" id="login-error"></p>
      </div>
    </div>

    <!-- ── Vault ──────────────────────────────────────────────── -->
    <div id="vault">
      <header>
        <h1>🔐 Password Manager</h1>
        <div class="header-right">
          <button class="btn btn-ghost" onclick="toggleAddForm()">+ Add Entry</button>
          <button class="btn btn-ghost" onclick="signOut()">Sign out</button>
        </div>
      </header>

      <!-- Add entry form -->
      <div class="card" id="add-card" style="display:none">
        <div class="card-header">
          <h2>New Entry</h2>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-field">
              <label>Site / App</label>
              <input class="input" id="f-site" placeholder="e.g. GitHub" style="margin:0" />
            </div>
            <div class="form-field">
              <label>Username / Email</label>
              <input class="input" id="f-user" placeholder="e.g. alex@email.com" style="margin:0" />
            </div>
            <div class="form-field">
              <label>Password</label>
              <input class="input" id="f-pass" type="password" placeholder="Password" style="margin:0" />
            </div>
            <div class="form-field">
              <label>Description</label>
              <input class="input" id="f-desc" placeholder="Optional note" style="margin:0" />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" id="save-btn" onclick="saveEntry()" style="width:auto">Save</button>
            <button class="btn btn-ghost" onclick="cancelAdd()">Cancel</button>
            <p class="error-msg" id="save-error" style="margin:0;line-height:1"></p>
          </div>
        </div>
      </div>

      <!-- Entries -->
      <div class="card">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:10px;">
            <h2>Saved Passwords</h2>
            <span class="badge" id="entry-count">0</span>
          </div>
          <input
            class="search-input"
            id="search"
            type="search"
            placeholder="Search…"
            oninput="filterEntries()"
          />
        </div>
        <div id="entries-body">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Load order matters: crypto first (no deps), then state, then vault logic, then auth -->
    <script src="crypto.js"></script>
    <script src="app.js"></script>
    <script src="entries.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
