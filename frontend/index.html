<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Manager</title>
    <style>
      /* ── Variables ─────────────────────────────────────────────── */
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --text: #e2e8f0;
        --muted: #64748b;
        --accent: #3b82f6;
        --accent-dim: #1e3a5f;
        --danger: #ef4444;
        --danger-dim: #3a1a1a;
        --success: #22c55e;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
      }

      /* ── Login ─────────────────────────────────────────────────── */
      #login {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .login-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 48px 40px;
        width: 360px;
        text-align: center;
      }

      .login-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
      .login-box h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
      .login-box p { color: var(--muted); font-size: 0.875rem; margin-bottom: 28px; }

      .input {
        width: 100%;
        padding: 11px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 1rem;
        margin-bottom: 12px;
        outline: none;
        transition: border-color 0.2s;
      }

      .input:focus { border-color: var(--accent); }

      .btn {
        padding: 11px 20px;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn:hover { opacity: 0.85; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-primary { background: var(--accent); color: #fff; width: 100%; }
      .btn-ghost {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
      .btn-danger { background: var(--danger); color: #fff; font-size: 0.8rem; padding: 5px 12px; }

      .error-msg { color: #f87171; font-size: 0.8rem; margin-top: 10px; min-height: 1.2em; }

      /* ── Vault ─────────────────────────────────────────────────── */
      #vault {
        display: none;
        max-width: 960px;
        margin: 0 auto;
        padding: 28px 16px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }

      header h1 { font-size: 1.3rem; font-weight: 700; }

      .header-right { display: flex; align-items: center; gap: 12px; }

      /* ── Add form card ──────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
      }

      .card-header h2 { font-size: 0.95rem; font-weight: 600; }

      .card-body { padding: 16px 20px; }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        gap: 10px;
        align-items: end;
      }

      @media (max-width: 700px) {
        .form-grid { grid-template-columns: 1fr 1fr; }
      }

      .form-field label {
        display: block;
        font-size: 0.72rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 5px;
      }

      .form-actions { display: flex; gap: 8px; align-items: flex-end; padding-top: 20px; }

      /* ── Entries table ─────────────────────────────────────────── */
      table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }

      th {
        color: var(--muted);
        font-size: 0.71rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }

      td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
        vertical-align: middle;
      }

      tr:last-child td { border-bottom: none; }
      tr:hover td { background: rgba(255,255,255,0.02); }

      td.muted { color: var(--muted); font-size: 0.82rem; }

      .pw-cell { display: flex; align-items: center; gap: 8px; }

      .pw-text {
        font-family: monospace;
        letter-spacing: 0.08em;
        font-size: 0.9rem;
      }

      .reveal-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 0.9rem;
        padding: 2px 4px;
        border-radius: 4px;
        transition: color 0.2s;
      }
      .reveal-btn:hover { color: var(--text); }

      .copy-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 0.8rem;
        padding: 2px 4px;
        border-radius: 4px;
        transition: color 0.2s;
      }
      .copy-btn:hover { color: var(--accent); }

      /* ── States ────────────────────────────────────────────────── */
      .loading, .empty {
        text-align: center;
        color: var(--muted);
        padding: 40px 0;
        font-size: 0.875rem;
      }

      .err {
        text-align: center;
        color: #f87171;
        padding: 24px 0;
        font-size: 0.875rem;
      }

      .badge {
        background: var(--accent-dim);
        color: var(--accent);
        font-size: 0.68rem;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 99px;
      }

      .search-input {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 0.85rem;
        padding: 6px 12px;
        outline: none;
        width: 220px;
        transition: border-color 0.2s;
      }
      .search-input:focus { border-color: var(--accent); }
      .search-input::placeholder { color: var(--muted); }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--success);
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 0.85rem;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>

    <!-- ── Login ──────────────────────────────────────────────── -->
    <div id="login">
      <div class="login-box">
        <div class="icon">🔐</div>
        <h1>Password Manager</h1>
        <p>Enter your master password to unlock</p>
        <input
          class="input"
          type="password"
          id="master-pw"
          placeholder="Master password"
          onkeydown="if(event.key==='Enter') unlock()"
          autofocus
        />
        <button class="btn btn-primary" id="unlock-btn" onclick="unlock()">Unlock</button>
        <p class="error-msg" id="login-error"></p>
      </div>
    </div>

    <!-- ── Vault ──────────────────────────────────────────────── -->
    <div id="vault">
      <header>
        <h1>🔐 Password Manager</h1>
        <div class="header-right">
          <button class="btn btn-ghost" onclick="toggleAddForm()">+ Add Entry</button>
          <button class="btn btn-ghost" onclick="signOut()">Sign out</button>
        </div>
      </header>

      <!-- Add entry form -->
      <div class="card" id="add-card" style="display:none">
        <div class="card-header">
          <h2>New Entry</h2>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-field">
              <label>Site / App</label>
              <input class="input" id="f-site" placeholder="e.g. GitHub" style="margin:0" />
            </div>
            <div class="form-field">
              <label>Username / Email</label>
              <input class="input" id="f-user" placeholder="e.g. alex@email.com" style="margin:0" />
            </div>
            <div class="form-field">
              <label>Password</label>
              <input class="input" id="f-pass" type="password" placeholder="Password" style="margin:0" />
            </div>
            <div class="form-field">
              <label>Description</label>
              <input class="input" id="f-desc" placeholder="Optional note" style="margin:0" />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" id="save-btn" onclick="saveEntry()" style="width:auto">Save</button>
            <button class="btn btn-ghost" onclick="cancelAdd()">Cancel</button>
            <p class="error-msg" id="save-error" style="margin:0;line-height:1"></p>
          </div>
        </div>
      </div>

      <!-- Entries -->
      <div class="card">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:10px;">
            <h2>Saved Passwords</h2>
            <span class="badge" id="entry-count">0</span>
          </div>
          <input
            class="search-input"
            id="search"
            type="search"
            placeholder="Search…"
            oninput="filterEntries()"
          />
        </div>
        <div id="entries-body">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // ── State ────────────────────────────────────────────────────
      let API_URL = "";
      let encryptionSalt = "";
      let encryptionKey = null;   // CryptoKey — stays in memory only
      let authToken = "";
      let allEntries = [];        // full decrypted list for client-side search

      // ── Boot ─────────────────────────────────────────────────────
      (async () => {
        try {
          const cfg = await fetch("config.json").then((r) => r.json());
          API_URL = cfg.apiUrl.replace(/\/$/, "");
          const authCfg = await fetch(`${API_URL}/auth/config`).then((r) => r.json());
          encryptionSalt = authCfg.encryption_salt;
        } catch (e) {
          document.getElementById("login-error").textContent =
            "Could not reach API — check config.json";
        }
      })();

      // ── Auth ─────────────────────────────────────────────────────
      async function unlock() {
        const pw = document.getElementById("master-pw").value;
        const btn = document.getElementById("unlock-btn");
        const errEl = document.getElementById("login-error");
        errEl.textContent = "";

        if (!pw) { errEl.textContent = "Enter your master password"; return; }
        if (!encryptionSalt) { errEl.textContent = "API not ready — reload the page"; return; }

        btn.disabled = true;
        btn.textContent = "Unlocking…";

        try {
          const verHash = await deriveVerificationHash(pw);

          const res = await fetch(`${API_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ verification_hash: verHash }),
          });

          if (!res.ok) {
            errEl.textContent = "Incorrect password";
            return;
          }

          const { token } = await res.json();
          authToken = token;

          // Derive encryption key — never leaves the browser
          encryptionKey = await deriveEncryptionKey(pw, encryptionSalt);

          document.getElementById("login").style.display = "none";
          document.getElementById("vault").style.display = "block";
          loadEntries();
        } catch (e) {
          errEl.textContent = "Login failed — " + e.message;
        } finally {
          btn.disabled = false;
          btn.textContent = "Unlock";
        }
      }

      function signOut() {
        authToken = "";
        encryptionKey = null;
        document.getElementById("master-pw").value = "";
        document.getElementById("vault").style.display = "none";
        document.getElementById("login").style.display = "flex";
        document.getElementById("master-pw").focus();
      }

      // ── Entries ──────────────────────────────────────────────────
      async function loadEntries() {
        const el = document.getElementById("entries-body");
        el.innerHTML = '<div class="loading">Loading…</div>';

        try {
          const res = await fetch(`${API_URL}/entries`, {
            headers: { Authorization: `Bearer ${authToken}` },
          });
          if (!res.ok) throw new Error("Fetch failed");

          const { entries } = await res.json();

          const decrypted = await Promise.all(
            entries.map(async (e) => {
              const plain = await decrypt(e.encrypted_data, e.iv, encryptionKey);
              return { id: e.id, ...plain };
            })
          );

          allEntries = decrypted;
          // Re-apply any active search after a reload
          filterEntries();
        } catch (e) {
          el.innerHTML = '<div class="err">Could not load entries — ' + e.message + "</div>";
        }
      }

      // ── Search ───────────────────────────────────────────────────
      function filterEntries() {
        const q = document.getElementById("search").value.trim().toLowerCase();
        if (!q) {
          renderEntries(allEntries);
          return;
        }
        const filtered = allEntries.filter((e) =>
          (e.site || "").toLowerCase().includes(q) ||
          (e.username || "").toLowerCase().includes(q) ||
          (e.description || "").toLowerCase().includes(q)
        );
        renderEntries(filtered);
      }

      function renderEntries(entries) {
        const el = document.getElementById("entries-body");
        document.getElementById("entry-count").textContent =
          entries.length === allEntries.length
            ? entries.length
            : `${entries.length} / ${allEntries.length}`;

        if (entries.length === 0) {
          el.innerHTML = '<div class="empty">No entries yet — add your first password above</div>';
          return;
        }

        const rows = entries
          .map(
            (e) => `
          <tr>
            <td>${esc(e.site || "—")}</td>
            <td>${esc(e.username || "—")}</td>
            <td>
              <div class="pw-cell">
                <span class="pw-text" id="pw-${e.id}">••••••••</span>
                <button class="reveal-btn" onclick="toggleReveal('${e.id}', '${esc(e.password || "")}')" title="Show/hide">👁</button>
                <button class="copy-btn" onclick="copyPw('${e.id}', '${esc(e.password || "")}')" title="Copy">⎘</button>
              </div>
            </td>
            <td class="muted">${esc(e.description || "")}</td>
            <td>
              <button class="btn btn-danger" onclick="deleteEntry('${e.id}')">Delete</button>
            </td>
          </tr>`
          )
          .join("");

        el.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Site / App</th>
                <th>Username</th>
                <th>Password</th>
                <th>Description</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      // ── Add entry ────────────────────────────────────────────────
      function toggleAddForm() {
        const card = document.getElementById("add-card");
        card.style.display = card.style.display === "none" ? "block" : "none";
        if (card.style.display === "block") {
          document.getElementById("f-site").focus();
        }
      }

      function cancelAdd() {
        document.getElementById("add-card").style.display = "none";
        ["f-site", "f-user", "f-pass", "f-desc"].forEach(
          (id) => (document.getElementById(id).value = "")
        );
        document.getElementById("save-error").textContent = "";
      }

      async function saveEntry() {
        const site = document.getElementById("f-site").value.trim();
        const username = document.getElementById("f-user").value.trim();
        const password = document.getElementById("f-pass").value;
        const description = document.getElementById("f-desc").value.trim();
        const errEl = document.getElementById("save-error");
        const btn = document.getElementById("save-btn");

        errEl.textContent = "";
        if (!site || !username || !password) {
          errEl.textContent = "Site, username and password are required";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Saving…";

        try {
          const { iv, ciphertext } = await encrypt(
            { site, username, password, description },
            encryptionKey
          );

          const res = await fetch(`${API_URL}/entries`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${authToken}`,
            },
            body: JSON.stringify({ encrypted_data: ciphertext, iv }),
          });

          if (!res.ok) throw new Error("Save failed");

          cancelAdd();
          await loadEntries();
          showToast("Entry saved ✓");
        } catch (e) {
          errEl.textContent = e.message;
        } finally {
          btn.disabled = false;
          btn.textContent = "Save";
        }
      }

      // ── Delete entry ─────────────────────────────────────────────
      async function deleteEntry(id) {
        if (!confirm("Delete this entry? This cannot be undone.")) return;

        try {
          await fetch(`${API_URL}/entries/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${authToken}` },
          });
          await loadEntries();
          showToast("Entry deleted");
        } catch (e) {
          alert("Delete failed: " + e.message);
        }
      }

      // ── Password reveal / copy ───────────────────────────────────
      function toggleReveal(id, pw) {
        const el = document.getElementById(`pw-${id}`);
        el.textContent = el.textContent === "••••••••" ? pw : "••••••••";
      }

      async function copyPw(id, pw) {
        try {
          await navigator.clipboard.writeText(pw);
          showToast("Password copied ✓");
        } catch {
          alert("Copy failed — use the reveal button instead");
        }
      }

      // ── Toast ────────────────────────────────────────────────────
      function showToast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2500);
      }

      // ── Crypto ───────────────────────────────────────────────────
      async function deriveVerificationHash(password) {
        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey(
          "raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]
        );
        const bits = await crypto.subtle.deriveBits(
          { name: "PBKDF2", salt: enc.encode("verification-salt-v1"), iterations: 600000, hash: "SHA-256" },
          km, 256
        );
        return Array.from(new Uint8Array(bits))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      async function deriveEncryptionKey(password, saltHex) {
        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey(
          "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: hexToBytes(saltHex), iterations: 600000, hash: "SHA-256" },
          km,
          { name: "AES-GCM", length: 256 },
          false,
          ["encrypt", "decrypt"]
        );
      }

      async function encrypt(data, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const ct = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv },
          key,
          new TextEncoder().encode(JSON.stringify(data))
        );
        return { iv: toB64(iv), ciphertext: toB64(new Uint8Array(ct)) };
      }

      async function decrypt(ctB64, ivB64, key) {
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: fromB64(ivB64) },
          key,
          fromB64(ctB64)
        );
        return JSON.parse(new TextDecoder().decode(plain));
      }

      // ── Helpers ──────────────────────────────────────────────────
      function hexToBytes(hex) {
        const b = new Uint8Array(hex.length / 2);
        for (let i = 0; i < hex.length; i += 2)
          b[i / 2] = parseInt(hex.slice(i, i + 2), 16);
        return b;
      }

      function toB64(bytes) {
        return btoa(String.fromCharCode(...bytes));
      }

      function fromB64(b64) {
        return Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    </script>
  </body>
</html>
