<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sutton5050</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">

      <header>
        <div>
          <h1>👋 Hey, Alex</h1>
          <p>Your personal dashboard — pick where you want to go.</p>
        </div>
        <label class="toggle-wrap" title="Toggle to copy passwords when opening apps">
          <span id="toggle-label" class="toggle-label-text">Logged in</span>
          <div class="toggle">
            <input type="checkbox" id="mode-toggle" onchange="onToggleChange()" />
            <span class="toggle-slider"></span>
          </div>
        </label>
      </header>

      <p class="section-label">Apps</p>

      <div id="grid" class="grid"></div>

    </div>

    <!-- Master password modal -->
    <div id="auth-modal" class="modal-overlay" style="display:none"
         onclick="if(event.target===this)closeAuthModal()">
      <div class="modal-box">
        <div class="modal-icon">🔐</div>
        <h2>Master Password</h2>
        <p>Required to fetch your credentials</p>
        <input type="password" id="modal-pw" class="modal-input" placeholder="Master password"
               onkeydown="if(event.key==='Enter')modalUnlock()" />
        <div id="modal-error" class="modal-error"></div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="modal-unlock-btn" onclick="modalUnlock()">Unlock</button>
          <button class="btn btn-ghost" onclick="closeAuthModal()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Add credentials modal -->
    <div id="add-modal" class="modal-overlay" style="display:none"
         onclick="if(event.target===this)modalSkip()">
      <div class="modal-box">
        <div class="modal-icon">➕</div>
        <h2 id="add-modal-title">Add Credentials</h2>
        <p>No entry found — save one now or skip</p>
        <input type="text" id="add-site" class="modal-input" placeholder="Site / App name" />
        <input type="text" id="add-user" class="modal-input" placeholder="Username or email" />
        <input type="password" id="add-pass" class="modal-input" placeholder="Password"
               onkeydown="if(event.key==='Enter')modalSaveAndGo()" />
        <div id="add-error" class="modal-error"></div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="add-save-btn" onclick="modalSaveAndGo()">Save &amp; Continue</button>
          <button class="btn btn-ghost" onclick="modalSkip()">Skip</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="dash-toast" class="toast"></div>

    <script src="/passwords/crypto.js"></script>
    <script src="vault.js"></script>
    <script src="cards.js"></script>
  </body>
</html>
