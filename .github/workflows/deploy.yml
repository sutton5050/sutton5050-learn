name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CDK dependencies
        run: pip install -r infrastructure/requirements.txt

      # Deploy backend first so we can read the API URL
      - name: Deploy backend
        run: cdk deploy PasswordManagerBackend --require-approval never
        working-directory: infrastructure

      # Write config.json with the live API URL before frontend deploys
      - name: Write frontend config
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name PasswordManagerBackend \
            --region eu-west-2 \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          # Strip trailing slash
          API_URL="${API_URL%/}"
          echo "{\"apiUrl\": \"${API_URL}\"}" > frontend/config.json
          echo "API URL written: $API_URL"

      - name: Deploy frontend
        run: cdk deploy PasswordManagerFrontend --require-approval never
        working-directory: infrastructure

      # Sync password manager files directly — more reliable than CDK BucketDeployment
      # which skips re-runs when the source hash hasn't changed.
      - name: Sync password manager to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name PasswordManagerFrontend \
            --region eu-west-2 \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name PasswordManagerFrontend \
            --region eu-west-2 \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          aws s3 sync frontend/ s3://$BUCKET/passwords/ --region eu-west-2 --delete
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/passwords/*"
